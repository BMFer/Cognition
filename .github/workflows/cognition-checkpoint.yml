name: Cognition Checkpoint

on:
  pull_request:
    types: [closed]

jobs:
  post-checkpoint-stub:
    if: github.event.pull_request.merged == true
    name: Post checkpoint stub
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Comment paste-ready stub for decision-log and nap-checkpoints
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const decisionMatch = body.match(/^- \[[xX]\] (Merge|Revise|Reject|Split task)/m);
            const decision = decisionMatch ? decisionMatch[1] : 'Unknown';

            const clusterMatch = body.match(/^\*\*Cluster\*\*\s*:\s*(claude|codex)/im);
            const cluster = clusterMatch ? clusterMatch[1] : 'unknown';

            const today = new Date().toISOString().split('T')[0];
            const sha = pr.merge_commit_sha || '';

            const stub = [
              `### Cognition checkpoint stub for #${pr.number}`,
              ``,
              `Paste these blocks into \`.ai/decision-log.md\` and \`.ai/nap-checkpoints.md\` in the next PR. Fill in the \`<...>\` placeholders before merging that PR.`,
              ``,
              `**For \`.ai/decision-log.md\`:**`,
              ``,
              '```text',
              `Date: ${today}`,
              `Decision: <one-line summary of what was decided>`,
              `Context: PR #${pr.number} - ${pr.title} (cluster: ${cluster})`,
              `Evidence: see PR body and merged commit ${sha}`,
              `Alternatives: <what was rejected and why>`,
              `Governor outcome: ${decision}`,
              `Follow-up: <what this commits us to next>`,
              '```',
              ``,
              `**For \`.ai/nap-checkpoints.md\`:**`,
              ``,
              '```text',
              `Date: ${today}`,
              `Checkpoint: <short name>`,
              `Merged commit / PR: ${sha} / #${pr.number}`,
              `What changed: ${pr.title}`,
              `What was proven: <claim that is now backed by merged tests>`,
              `What remains uncertain: <open questions, risks, untested paths>`,
              `Next replan: <the question the next reasoning cycle should answer>`,
              '```',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: stub,
            });
