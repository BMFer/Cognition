name: Cognition Judge

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate-cognition-artifacts:
    name: Validate cognition artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate protocol files
        shell: pwsh
        env:
          COGNITION_PR_BODY: ${{ github.event.pull_request.body }}
        run: ./scripts/validate-cognition-artifacts.ps1
